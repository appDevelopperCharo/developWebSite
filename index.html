<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>チャロ｜ゲーム開発者</title>
    <meta name="description" content="ゲーム開発者『チャロ』のポートフォリオ。ダンジョン・テイマー、スライムタップなどの作品を公開中。">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>
<body>
    <header id="header">
        <div class="container container-header">
            <div class="logo">
                <span class="logo-text">チャロ｜<span class="accent-text">開発者</span></span>
            </div>
        </div>
    </header>

    <main>
        <!-- Hero Section -->
        <section id="hero" class="hero">
            <div class="container hero-content">
                <div class="hero-text" data-aos="fade-up">
                    <h1>チャロ｜ゲーム開発者</h1>
                    <p class="tagline">戦略と遊び心を形にする、インディーゲームデベロッパー</p>
                    
                    <div class="game-list-container">
                        <div class="list-label">MY GAMES</div>
                        <ul class="game-vertical-list">
                            <li data-aos="fade-up" data-aos-delay="100">
                                <a href="dungeon-tamer.html" class="game-list-item">
                                    <div class="item-content">
                                        <img src="assets/icon_dt.png" alt="Icon" class="title-icon">
                                        <div class="item-text">
                                            <h3>ダンジョン・テイマー</h3>
                                            <span>戦略×ローグライクRPG</span>
                                        </div>
                                    </div>
                                    <span class="arrow">→</span>
                                </a>
                            </li>
                            <li data-aos="fade-up" data-aos-delay="200">
                                <a href="slime-tap.html" class="game-list-item">
                                    <div class="item-content">
                                        <img src="assets/icon_slime.png" alt="Icon" class="title-icon">
                                        <div class="item-text">
                                            <h3>スライムタップ</h3>
                                            <span>爽快タップバトル！</span>
                                        </div>
                                    </div>
                                    <span class="arrow">→</span>
                                </a>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer id="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-logo">
                    <span class="logo-text">チャロ｜<span class="accent-text">開発者</span></span>
                </div>
                <div class="footer-bottom">
                    <p>&copy; 2026 yuuichi sasaki / Charo Games. All rights reserved.</p>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script type="module" src="main.js"></script>
</body>
</html>
